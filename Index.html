<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Surprise 🤎</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Cormorant+Garamond:wght@500&display=swap" rel="stylesheet">
</head>

<body>

<!-- Slide 1 -->
<section class="slide active" id="slide1">
  <div class="bg" style="background-image:url('https://i.ibb.co/8gNm1RBw/file-0000000051f471faa6ad64638f226cb7.png')"></div>
  <div class="overlay"></div>

  <div class="content">
    <h1>Happiest Birthday</h1>
    <p>to someone...</p>

    <button onclick="nextSlide()">
      Next ♡
    </button>
  </div>
</section>

<!-- Slide 2 -->
<section class="slide" id="slide2">
  <div class="bg" style="background-image:url('https://i.ibb.co/9BKFzyG/file-000000000ef4720786ff11090413b5c4.png')"></div>
  <div class="overlay"></div>

  <div class="content">
    <h1>Someone Who</h1>
    <p>makes me smile every day ♡</p>

    <button onclick="nextSlide()">
      Next ♡
    </button>
  </div>
</section>

<!-- Slide 3 -->
<section class="slide beige" id="slide3">

  <div class="floating-hearts">
    <span>♡</span>
    <span>♡</span>
    <span>♡</span>
    <span>♡</span>
  </div>

  <div class="content">
    <h1>Wondering Who?</h1>

    <button onclick="startCamera()">
      Tap To Reveal 📸
    </button>

    <video id="video" autoplay playsinline></video>

    <div id="revealText">
      <h1>Yep, It's You ♡</h1>
    </div>

    <button id="continueBtn" onclick="nextSlide()">
      Continue ❤️
    </button>
  </div>

</section>

<!-- Slide 4 -->
<section class="slide" id="slide4">

  <div class="bg" style="background-image:url('https://i.ibb.co/C5G93bpr/file-00000000a4fc7208919c6e16e0185202.png')"></div>

  <div class="overlay"></div>

  <div class="content">

    <p>and the best part is,</p>

    <h1>I get to love you ♡</h1>

    <button onclick="openPopup()">
      One Last Thing...
    </button>

  </div>

</section>

<!-- Popup -->
<div class="popup" id="popup">

  <div class="popup-card">

    <img src="https://i.ibb.co/hJMvb1ST/file-0000000027d071fa95f18aa75edfa83f.png">

    <h2>Happy Birthday My Love 🤎</h2>

    <p>
      Thank you for every smile,
      every laugh,
      every memory,
      and every moment.
      <br><br>
      You'll always be my favourite person ♡
    </p>

    <button onclick="closePopup()">
      Close ✨
    </button>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
